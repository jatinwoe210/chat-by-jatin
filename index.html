<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat By Jatin</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-shell">
        <div class="chat-container">
            <div id="login-screen" class="screen active">
                <div class="login-panel">
                    <img src="logo.jpg" alt="Chat By Jatin logo" class="login-logo">
                    <h1 class="login-title">Chat by Jatin</h1>
                    <p class="auth-subtitle">Create an account or log in to continue</p>

                    <div class="auth-toggle" role="tablist" aria-label="Authentication mode">
                        <button id="show-login-btn" class="auth-toggle-btn active" type="button">Login</button>
                        <button id="show-signup-btn" class="auth-toggle-btn" type="button">Sign up</button>
                    </div>

                    <div class="auth-form">
                        <div id="name-group" class="form-group hidden">
                            <input type="text" id="name" placeholder="Name" maxlength="30" autocomplete="name">
                        </div>

                        <div class="form-group">
                            <input type="text" id="username" placeholder="Username" maxlength="20" autocomplete="username">
                        </div>

                        <div class="form-group">
                            <input type="password" id="password" placeholder="Password" maxlength="50" autocomplete="current-password">
                        </div>

                    </div>

                    <p id="auth-message" class="auth-message" aria-live="polite"></p>
                    <button id="auth-submit-btn">Log In</button>
                </div>
            </div>

            <div id="chat-screen" class="screen">
                <aside class="sidebar">
                    <div class="sidebar-header">
                        <div class="profile-chip">
                            <div class="profile-avatar" id="sidebar-avatar">Y</div>
                            <div>
                                <strong id="current-user">You</strong>
                                <p>Available now</p>
                            </div>
                        </div>
                        <button id="leave-btn" class="ghost-btn">Leave</button>
                    </div>

                    <div class="sidebar-search">
                        <div class="search-pill">🔎 <span>Search or start a new chat</span></div>
                    </div>

                    <div class="users-panel">
                        <div class="users-header">
                            <span>Online users</span>
                            <span id="user-count">0 online</span>
                        </div>
                        <div id="users-list" class="users-list"></div>
                    </div>
                </aside>

                <main class="conversation-panel">
                    <div class="chat-header">
                        <div>
                            <p class="chat-kicker">Encrypted-style global chat</p>
                            <h2>General chat</h2>
                        </div>
                        <div class="chat-status">
                            <span class="status-dot"></span>
                            <span id="active-members">0 participants</span>
                        </div>
                    </div>

                    <div class="messages-container">
                        <div class="chat-watermark"></div>
                        <div id="messages"></div>
                        <div id="typing-indicator"></div>
                    </div>

                    <div class="message-input-container">
                        <button class="composer-icon" type="button" aria-label="Emoji picker">😊</button>
                        <input type="text" id="message-input" placeholder="Type a message" maxlength="500">
                        <button id="send-btn">Send</button>
                    </div>
                </main>
            </div>
        </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script src="script.js"></script>
</body>
</html>
