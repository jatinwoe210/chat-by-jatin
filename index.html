<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat By Jatin</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-shell">
        <div class="chat-container">
            <div id="login-screen" class="screen active">
                <div class="login-panel">
                    <img src="logo.jpg" alt="Chat By Jatin logo" class="login-logo">
                    <h1 class="login-title">Chat by Jatin</h1>
                    <p class="auth-subtitle">Create an account or log in to continue</p>

                    <div class="auth-toggle" role="tablist" aria-label="Authentication mode">
                        <button id="show-login-btn" class="auth-toggle-btn active" type="button">Login</button>
                        <button id="show-signup-btn" class="auth-toggle-btn" type="button">Sign up</button>
                    </div>

                    <div class="auth-form">
                        <div id="name-group" class="form-group hidden">
                            <input type="text" id="name" placeholder="Name" maxlength="30" autocomplete="name">
                        </div>

                        <div class="form-group">
                            <input type="text" id="username" placeholder="Username" autocomplete="username">
                        </div>

                        <div class="form-group password-group">
                            <input type="password" id="password" placeholder="Password" maxlength="50" autocomplete="current-password">
                            <button id="toggle-password-btn" class="password-toggle-btn" type="button" aria-label="Show password" aria-pressed="false">
                                <svg id="password-eye-icon" viewBox="0 0 24 24" aria-hidden="true">
                                    <path d="M12 5C7 5 2.73 8.11 1 12c1.73 3.89 6 7 11 7s9.27-3.11 11-7c-1.73-3.89-6-7-11-7Zm0 11a4 4 0 1 1 0-8 4 4 0 0 1 0 8Zm0-6a2 2 0 1 0 0 4 2 2 0 0 0 0-4Z"></path>
                                </svg>
                            </button>
                        </div>
                    </div>

                    <p id="auth-message" class="auth-message" aria-live="polite"></p>
                    <button id="auth-submit-btn">Log In</button>

                    <div class="auth-divider" aria-hidden="true"><span>or</span></div>
                    <button id="google-auth-btn" class="google-btn" type="button">Continue with Google</button>
                </div>
            </div>

            <div id="password-setup-screen" class="screen">
                <div class="login-panel">
                    <h1 class="login-title">Set your password</h1>
                    <p class="auth-subtitle">You're new here. Add a password so you can also log in with your credentials.</p>
                    <div class="auth-form">
                        <div class="form-group password-group">
                            <input type="password" id="google-password" placeholder="Create password" maxlength="50" autocomplete="new-password">
                            <button id="toggle-google-password-btn" class="password-toggle-btn" type="button" aria-label="Show password" aria-pressed="false">
                                <svg id="google-password-eye-icon" viewBox="0 0 24 24" aria-hidden="true">
                                    <path d="M12 5C7 5 2.73 8.11 1 12c1.73 3.89 6 7 11 7s9.27-3.11 11-7c-1.73-3.89-6-7-11-7Zm0 11a4 4 0 1 1 0-8 4 4 0 0 1 0 8Zm0-6a2 2 0 1 0 0 4 2 2 0 0 0 0-4Z"></path>
                                </svg>
                            </button>
                        </div>
                    </div>
                    <p id="google-password-message" class="auth-message" aria-live="polite"></p>
                    <button id="google-password-submit-btn">Save Password</button>
                </div>
            </div>

            <div id="profile-setup-screen" class="screen">
                <div class="login-panel">
                    <h1 class="login-title">Profile Setup</h1>
                    <p class="auth-subtitle">Choose a unique username and display name.</p>
                    <div class="auth-form">
                        <div class="form-group">
                            <input type="text" id="profile-username" placeholder="Unique username" maxlength="30" autocomplete="username">
                        </div>
                        <div class="form-group">
                            <input type="text" id="profile-display-name" placeholder="Display name" maxlength="30" autocomplete="name">
                        </div>
                    </div>
                    <p id="profile-message" class="auth-message" aria-live="polite"></p>
                    <button id="profile-submit-btn">Save Profile</button>
                </div>
            </div>

            <div id="chat-screen" class="screen">
                <main class="conversation-panel mobile-app-shell">
                    <div class="chat-header glass-panel">
                        <div class="profile-chip">
                            <div class="profile-avatar" id="sidebar-avatar">Y</div>
                            <div>
                                <p class="chat-kicker">Secure hybrid messenger</p>
                                <h2 id="current-user">You</h2>
                            </div>
                        </div>
                        <button id="leave-btn" class="ghost-btn">Leave</button>
                    </div>

                    <div class="chat-category-tabs glass-panel" role="tablist" aria-label="Chat categories">
                        <button class="chat-tab active" type="button" data-tab="all">All</button>
                        <button class="chat-tab" type="button" data-tab="personal">Personal</button>
                        <button class="chat-tab" type="button" data-tab="groups">Groups</button>
                    </div>

                    <div class="chat-status-inline">
                        <span class="status-dot"></span>
                        <span id="active-members">0 participants</span>
                        <span class="dot-separator">•</span>
                        <span id="user-count">0 online</span>
                    </div>

                    <div class="messages-container">
                        <div class="chat-watermark"></div>
                        <div id="messages"></div>
                        <div id="typing-indicator"></div>
                    </div>

                    <div class="message-input-container glass-panel">
                        <button class="composer-icon" type="button" aria-label="Open emoji picker">😊</button>
                        <input type="text" id="message-input" placeholder="Type a message" maxlength="500">
                        <button id="sticker-btn" class="sticker-btn" type="button" aria-label="Open sticker panel">🩷</button>
                        <button id="send-btn">Send</button>
                    </div>

                    <nav class="bottom-nav glass-panel" aria-label="Primary navigation">
                        <button class="bottom-nav-item active" type="button"><span>💬</span><small>Chats</small></button>
                        <button class="bottom-nav-item" type="button"><span>👥</span><small>Groups</small></button>
                        <button class="bottom-nav-item" type="button"><span>🔔</span><small>Updates</small></button>
                        <button class="bottom-nav-item" type="button"><span>⚙️</span><small>Settings</small></button>
                    </nav>

                    <div id="users-list" class="users-list hidden"></div>
                </main>
            </div>
        </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script type="module" src="script.js"></script>
</body>
</html>
